<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KOD KIRICI</title>

  <!-- PWA / iOS Ana Ekrana Ekle -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kod Kırıcı">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#fafafa">
  <link rel="manifest" href="manifest.json">

  <!-- iOS ikon (192px PNG olarak oluşturacağız) -->
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Typography */
      --font-head: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
      --font-body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;

      /* Ink (neutral) */
      --ink-0:   oklch(100% 0 0);
      --ink-50:  oklch(99% 0.003 250);
      --ink-100: oklch(96.5% 0.006 250);
      --ink-200: oklch(92% 0.012 255);
      --ink-300: oklch(82% 0.020 255);
      --ink-400: oklch(65% 0.030 258);
      --ink-500: oklch(48% 0.035 258);
      --ink-700: oklch(30% 0.040 260);
      --ink-900: oklch(18% 0.045 262);

      /* Accent */
      --cyan-100: oklch(95% 0.03 215);
      --cyan-500: oklch(68% 0.14 215);
      --cyan-600: oklch(58% 0.15 215);
      --magenta-100: oklch(95% 0.04 350);
      --magenta-500: oklch(62% 0.24 350);
      --magenta-600: oklch(55% 0.25 352);
      --amber-100: oklch(96% 0.04 85);
      --amber-500: oklch(78% 0.14 80);
      --amber-600: oklch(70% 0.15 75);
      --green-500: oklch(68% 0.16 150);
      --green-600: oklch(58% 0.17 150);
      --locked:    oklch(55% 0.015 260);

      /* Semantics */
      --bg:       var(--ink-50);
      --surface:  var(--ink-0);
      --border:   var(--ink-200);
      --text:     var(--ink-900);
      --text-dim: var(--ink-400);
      --primary:  var(--cyan-600);
      --danger:   var(--magenta-600);

      /* Component */
      --tile-size: 62px;
      --tile-gap:  6px;
      --radius:    10px;
      --radius-sm: 6px;
    }

    /* DARK MODE */
    body.dark {
      --ink-0:   oklch(16% 0.02 258);
      --ink-50:  oklch(20% 0.025 260);
      --ink-100: oklch(25% 0.03 260);
      --ink-200: oklch(33% 0.035 260);
      --ink-300: oklch(45% 0.035 258);
      --ink-400: oklch(60% 0.030 255);
      --ink-500: oklch(72% 0.025 255);
      --ink-700: oklch(86% 0.015 255);
      --ink-900: oklch(96% 0.01 258);
    }

    html { height: 100%; }

    body {
      height: 100%;
      position: fixed;
      width: 100%;
      overflow: hidden;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* HEADER */
    #header {
      width: 100%;
      max-width: 480px;
      padding: 12px 52px 10px 16px;
      text-align: center;
      border-bottom: 1.5px solid var(--border);
      position: relative;
      background: var(--surface);
    }

    #game-title {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--text);
    }

    #subtitle {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--primary);
      opacity: 0.8;
      margin-top: 2px;
    }

    #stats-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-top: 10px;
      width: 100%;
      padding: 0 8px;
      box-sizing: border-box;
    }

    #score-display { grid-column: 1; text-align: left; }
    #timer-display { grid-column: 2; text-align: center; width: 110px; justify-self: center; }
    #best-display  { grid-column: 3; text-align: right; }

    #timer-display {
      font-family: var(--font-head);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text);
      text-align: center;
    }

    #timer-display.warning {
      color: var(--danger);
      animation: timer-pulse 0.6s ease-in-out infinite;
    }

    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #score-display {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-align: center;
      position: relative;
    }

    .score-pop {
      position: absolute;
      left: 50%;
      top: -4px;
      transform: translateX(-50%);
      font-family: var(--font-head);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--green-500);
      pointer-events: none;
      white-space: nowrap;
      animation: score-float 0.9s ease-out forwards;
      z-index: 10;
    }

    @keyframes score-float {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-26px); }
    }

    #score-display strong {
      display: block;
      font-family: var(--font-head);
      font-size: 1.1rem;
      color: var(--amber-500);
    }

    #best-display {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-align: center;
    }

    #best-display strong {
      display: block;
      font-family: var(--font-head);
      font-size: 1.1rem;
      color: var(--primary);
    }

    #best-display.new-record strong {
      color: var(--danger);
      animation: record-pulse 0.6s ease-in-out 3;
    }

    @keyframes record-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .new-record-badge {
      display: inline-block;
      font-family: var(--font-head);
      font-size: 0.55rem;
      color: var(--danger);
      letter-spacing: 1px;
      animation: record-pulse 0.6s ease-in-out 3;
    }

    /* MOD SEKME */
    #mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--ink-100);
      border-radius: var(--radius);
      padding: 4px;
      gap: 4px;
      width: 100%;
    }

    .mode-tab {
      padding: 10px 6px;
      background: transparent;
      border: 1.5px solid transparent;
      color: var(--text-dim);
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 150ms;
    }

    .mode-tab.active {
      background: var(--surface);
      border-color: var(--primary);
      color: var(--primary);
    }

    .mode-tab.comp-tab.active {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Yarisma bilgi kutusu */
    #comp-info {
      width: 100%;
      background: var(--magenta-100);
      border: 1.5px solid var(--magenta-500);
      border-radius: var(--radius);
      padding: 14px 16px;
      flex-direction: column;
      gap: 8px;
      display: none;
    }

    #comp-info.visible { display: flex; }

    .comp-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-body);
      font-size: 0.82rem;
      letter-spacing: 1px;
      color: var(--ink-500);
    }

    .comp-info-val {
      font-family: var(--font-head);
      font-size: 0.78rem;
      color: var(--danger);
      letter-spacing: 1px;
    }

    .comp-badge {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--amber-600);
      background: var(--amber-100);
      border: 1.5px solid var(--amber-500);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Deneme paneli */
    #practice-panel { width: 100%; display: flex; flex-direction: column; gap: 16px; align-items: center; }
    #practice-panel.hidden { display: none; }

    /* SETUP OVERLAY */
    #setup-overlay {
      position: fixed;
      inset: 0;
      background: oklch(18% 0.045 262 / 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms;
    }

    #setup-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #setup-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      box-shadow: 0 8px 40px oklch(18% 0.045 262 / 0.12);
      padding: 28px;
      text-align: center;
      max-width: 420px;
      width: 92%;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #setup-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #setup-box h2 {
      font-family: var(--font-head);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--primary);
    }

    #btn-settings-from-setup {
      position: absolute;
      right: 0;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      width: 28px;
      height: 28px;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 150ms;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-settings-from-setup:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .length-toggle-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      width: 100%;
    }

    .length-btn {
      padding: 10px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-head);
      font-size: 0.8rem;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 120ms;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 66px;
      flex: 1;
    }

    .length-btn span.len-num {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }

    .length-btn span.len-label {
      font-size: 0.55rem;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    .length-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--cyan-100);
    }

    .length-btn:hover:not(.active) {
      border-color: var(--cyan-500);
      color: var(--cyan-500);
    }

    #setup-time-info {
      font-family: var(--font-body);
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    #setup-time-info strong {
      color: var(--amber-500);
      font-family: var(--font-head);
    }

    #btn-start-game {
      width: 100%;
      padding: 14px 40px;
      background: var(--green-500);
      border: none;
      color: var(--ink-0);
      font-family: var(--font-head);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 150ms;
    }

    #btn-start-game:hover {
      background: var(--green-600);
    }

    #btn-start-game:disabled {
      background: var(--ink-200);
      color: var(--ink-400);
      cursor: not-allowed;
    }

    .setup-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .setup-label {
      font-family: var(--font-head);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .setup-toggle-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      width: 100%;
    }

    .setup-btn {
      padding: 6px 10px;
      min-width: 44px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-head);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 120ms;
    }

    .setup-btn:first-child {
      width: 100%;
    }

    .setup-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--cyan-100);
    }

    .setup-btn:hover:not(.active) {
      border-color: var(--cyan-500);
      color: var(--cyan-500);
    }

    .setup-divider {
      width: 100%;
      border: none;
      border-top: 1.5px solid var(--border);
    }

    /* MAIN APP */
    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 200px;
      gap: 16px;
      flex: 1;
      min-height: 0;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      scrollbar-width: none;
    }

    #app::-webkit-scrollbar { display: none; }

    /* GAME BOARD */
    #game-board {
      display: flex;
      flex-direction: column;
      gap: var(--tile-gap);
    }

    .tile-row {
      display: flex;
      gap: var(--tile-gap);
    }

    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      border: 1.5px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--text);
      text-transform: uppercase;
      transition: border-color 80ms;
      border-radius: var(--radius);
      perspective: 250px;
    }

    .tile.filled {
      border-color: var(--primary);
    }

    .tile.joker-revealed {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--magenta-100);
      animation: joker-glow 0.5s ease-out;
    }

    .tile.correct {
      background: var(--green-500);
      border-color: var(--green-600);
      color: var(--ink-0);
    }

    .tile.present {
      background: var(--amber-500);
      border-color: var(--amber-600);
      color: var(--ink-900);
    }

    .tile.absent {
      background: var(--locked);
      border-color: var(--locked);
      color: var(--ink-0);
    }

    /* JOKER BAR */
    #joker-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 480px;
      flex-shrink: 0;
      padding: 8px 10px 6px;
      border-bottom: 1.5px solid var(--border);
      background: var(--surface);
    }

    .bar-sep {
      width: 1.5px;
      height: 24px;
      background: var(--border);
      margin: 0 2px;
    }

    #btn-hint {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--amber-100);
      border: 1.5px solid var(--amber-500);
      color: var(--amber-600);
      font-family: var(--font-head);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 5px 9px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 150ms;
      white-space: nowrap;
    }

    #btn-hint:hover { background: var(--amber-500); color: var(--ink-0); }

    #btn-hint:disabled {
      border-color: var(--border);
      color: var(--text-dim);
      background: transparent;
      cursor: not-allowed;
    }

    #coin-display {
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--amber-600);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #coin-display strong {
      font-size: 0.9rem;
      margin-left: 1px;
    }

    /* REKLAM OVERLAY */
    #ad-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: oklch(18% 0.045 262 / 0.7);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }

    #ad-overlay.visible { display: flex; }

    #ad-box {
      width: 88%;
      max-width: 360px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #ad-fake {
      position: relative;
      background: var(--ink-100);
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 180px;
    }

    #ad-brand {
      font-family: var(--font-head);
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--text-dim);
    }

    #ad-fake-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      justify-content: center;
    }

    .ad-bar {
      height: 14px;
      background: var(--ink-200);
      border-radius: 3px;
      width: 100%;
      animation: ad-pulse 2s ease-in-out infinite;
    }

    .ad-bar.short { width: 55%; animation-delay: 0.3s; }
    .ad-bar.medium { width: 75%; animation-delay: 0.6s; }

    @keyframes ad-pulse {
      0%,100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    #ad-countdown-wrap {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 34px;
      height: 34px;
      border: 2px solid var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #ad-timer {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }

    #ad-close {
      padding: 14px;
      background: transparent;
      border: none;
      border-top: 1.5px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: not-allowed;
      transition: all 200ms;
    }

    #ad-close:not(:disabled) {
      background: var(--amber-100);
      color: var(--amber-600);
      border-top-color: var(--amber-500);
      cursor: pointer;
    }

    #ad-close:not(:disabled):hover {
      background: var(--amber-500);
      color: var(--ink-0);
    }

    .joker-label {
      font-family: var(--font-head);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--danger);
      opacity: 0.8;
    }

    .joker-btn {
      width: 38px;
      height: 38px;
      background: var(--magenta-100);
      border: 1.5px solid var(--danger);
      color: var(--danger);
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 150ms;
      font-family: var(--font-head);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .joker-btn:hover:not(:disabled) {
      background: var(--danger);
      color: var(--ink-0);
    }

    .joker-btn:disabled,
    .joker-btn.joker-used {
      border-color: var(--border);
      color: var(--text-dim);
      background: transparent;
      cursor: not-allowed;
    }

    /* TOAST */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--danger);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 1px;
      padding: 10px 24px;
      border-radius: var(--radius);
      border: 1.5px solid var(--danger);
      box-shadow: 0 4px 16px oklch(18% 0.045 262 / 0.12);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.visible { opacity: 1; }

    /* OVERLAY */
    #screen-overlay {
      position: fixed;
      inset: 0;
      background: oklch(18% 0.045 262 / 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms;
    }

    #screen-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #overlay-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      box-shadow: 0 8px 40px oklch(18% 0.045 262 / 0.14);
      padding: 36px 40px;
      text-align: center;
      max-width: 340px;
      width: 90%;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #overlay-title {

    @keyframes glitch {
      0%, 85%, 100% { transform: translate(0); }
      87% { transform: translate(-2px, 0); }
      89% { transform: translate(2px, 0); }
      91% { transform: translate(-1px, 0); }
    }

    @keyframes bounce-in {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-7px); }
      35%       { transform: translateX(7px); }
      55%       { transform: translateX(-5px); }
      75%       { transform: translateX(5px); }
    }

    @keyframes flip-out {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(90deg); }
    }

    @keyframes flip-in {
      0%   { transform: rotateX(-90deg); }
      100% { transform: rotateX(0deg); }

      0%, 100% { transform: translateY(0); }

  function turkishLower(str) {
    return str
      .replace(/İ/g, 'i')
      .replace(/I/g, 'ı')
      .toLowerCase();
  }

  function turkishUpper(str) {
    return str
      .replace(/i/g, 'İ')
      .replace(/ı/g, 'I')
      .toUpperCase();
  }

  // ═══════════════════════════════════════════════════
  // SES SİSTEMİ (Web Audio API — harici dosya yok)
  // ═══════════════════════════════════════════════════
  const SFX = (() => {
    let _ctx = null;
    let _master = null;
    let _muted = false;

    function unlock() {
      try {
        if (!_ctx) {
          _ctx = new (window.AudioContext || window.webkitAudioContext)();
          // Master compressor — tüm sesler buradan geçer, seviye dengeli kalır
          _master = _ctx.createDynamicsCompressor();
          _master.threshold.value = -18;
          _master.knee.value      = 6;
          _master.ratio.value     = 4;
          _master.attack.value    = 0.003;
          _master.release.value   = 0.18;
          _master.connect(_ctx.destination);
        }
        if (_ctx.state === 'suspended') _ctx.resume();
      } catch(e) {}
    }

    function ac() {
      if (_muted || !_ctx || _ctx.state === 'suspended') return null;
      return _ctx;
    }

    function setMuted(val) { _muted = val; }
    function isMuted() { return _muted; }

    function out() { return _master || (_ctx ? _ctx.destination : null); }

    // Temel oscilator yardımcısı
    function _osc(ctx, freq, type, startT, endT, volStart, dest) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, startT);
      g.gain.setValueAtTime(volStart, startT);
      g.gain.exponentialRampToValueAtTime(0.0001, endT);
      o.connect(g); g.connect(dest);
      o.start(startT); o.stop(endT + 0.02);
      return { osc: o, gain: g };
    }

    // Tuş sesi — kısa gürültü patlaması, yüksek frekans bandı
    function keypress() {
      try {
        const ctx = ac(); if (!ctx) return;
        const dest = out();
        const t = ctx.currentTime;
        const sr = ctx.sampleRate;
        const frames = Math.floor(sr * 0.025);
        const buf = ctx.createBuffer(1, frames, sr);
        const d = buf.getChannelData(0);
        for (let i = 0; i < frames; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / frames);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 4000;
        const g = ctx.createGain(); g.gain.setValueAtTime(0.07, t);
        src.connect(hpf); hpf.connect(g); g.connect(dest);
        src.start(t);
      } catch(e) {}
    }

    // Doğru harf (yeşil) — yükselen üçlü arpej + shimmer
    function correct() {
      try {
        const ctx = ac(); if (!ctx) return;
        const dest = out();
        const t = ctx.currentTime + 0.01;
        // C5, E5, G5 arpej
        [523.25, 659.25, 783.99].forEach((freq, i) => {
          const start = t + i * 0.07;
          const { gain: g } = _osc(ctx, freq, 'sine', start, start + 0.35, 0.0001, dest);
          g.gain.setValueAtTime(0.0001, start);
          g.gain.linearRampToValueAtTime(0.22, start + 0.012);
          g.gain.exponentialRampToValueAtTime(0.0001, start + 0.35);
        });
        // C6 shimmer
        const sh = t + 0.16;
        const { gain: sg } = _osc(ctx, 1046.5, 'triangle', sh, sh + 0.45, 0.0001, dest);
        sg.gain.linearRampToValueAtTime(0.10, sh + 0.015);
        sg.gain.exponentialRampToValueAtTime(0.0001, sh + 0.45);
      } catch(e) {}
    }

    // Mevcut harf (sarı) — A4 + F5, ısınık ama belirsiz
    function present() {
      try {
        const ctx = ac(); if (!ctx) return;
        const dest = out();
        const t = ctx.currentTime + 0.01;
        [[440, 0], [698.46, 0.065]].forEach(([freq, delay]) => {
          const start = t + delay;
          const { gain: g } = _osc(ctx, freq, 'sine', start, start + 0.28, 0.0001, dest);
          g.gain.linearRampToValueAtTime(0.16, start + 0.012);
          g.gain.exponentialRampToValueAtTime(0.0001, start + 0.28);
        });
      } catch(e) {}
    }

    // Hata sesi — kare dalga, alçalan frekans
    function error() {
      try {
        const ctx = ac(); if (!ctx) return;
        const dest = out();
        const t = ctx.currentTime + 0.01;
        const { osc, gain: g } = _osc(ctx, 200, 'square', t, t + 0.22, 0.12, dest);
        osc.frequency.linearRampToValueAtTime(100, t + 0.20);
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
      } catch(e) {}
    }

    // Joker sesi — yükselen parlak arpej (neon pembe hissi)
    function joker() {
      try {
        const ctx = ac(); if (!ctx) return;
        const dest = out();
        const t = ctx.currentTime + 0.01;
        [880, 1108.73, 1318.51, 1760].forEach((freq, i) => {
          const start = t + i * 0.075;
          const { gain: g } = _osc(ctx, freq, 'sine', start, start + 0.28, 0.0001, dest);
          g.gain.linearRampToValueAtTime(0.17, start + 0.010);
          g.gain.exponentialRampToValueAtTime(0.0001, start + 0.28);
        });
      } catch(e) {}
    }

    // Kaybetme sesi — inen minör arpej
    function lose() {
      try {
        const ctx = ac(); if (!ctx) return;
        const dest = out();
        const t = ctx.currentTime + 0.01;
        [[466.16, 0], [349.23, 0.22], [277.18, 0.44], [220, 0.70]].forEach(([freq, delay]) => {
          const start = t + delay;
          const { gain: g } = _osc(ctx, freq, 'triangle', start, start + 0.55, 0.0001, dest);
          g.gain.linearRampToValueAtTime(0.22, start + 0.015);
          g.gain.exponentialRampToValueAtTime(0.0001, start + 0.55);
        });
      } catch(e) {}
    }

    // Alkış: ritmik gürültü patlamaları + bant filtre
    function applause(duration, vol) {
      try {
        const ctx = ac(); if (!ctx) return;
        const dest = out();
        duration = duration || 2.5; vol = vol || 0.45;
        const sr  = ctx.sampleRate;
        const len = Math.floor(sr * duration);
        const buf = ctx.createBuffer(2, len, sr);
        for (let ch = 0; ch < 2; ch++) {
          const d = buf.getChannelData(ch);
          for (let i = 0; i < len; i++) {
            const env  = Math.pow(1 - i / len, 0.25);
            const clap =
              Math.abs(Math.sin(i / sr * 11 * Math.PI)) *
              Math.abs(Math.sin(i / sr * 17 * Math.PI)) *
              Math.abs(Math.sin(i / sr * 23 * Math.PI));
            d[i] = (Math.random() * 2 - 1) * clap * env;
          }
        }
        const src = ctx.createBufferSource(); src.buffer = buf;
        const bpf = ctx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=2400; bpf.Q.value=0.9;
        const hpf = ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=700;
        const g = ctx.createGain();
        const t = ctx.currentTime;
        g.gain.setValueAtTime(0.001, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.18);
        g.gain.linearRampToValueAtTime(0.001, t + duration);
        src.connect(bpf); bpf.connect(hpf); hpf.connect(g); g.connect(dest);
        src.start();
      } catch(e) {}
    }

    // Kalp atışı — derin sub-bass darbe
    function _beat() {
      try {
        const ctx = ac(); if (!ctx) return;
        const dest = out();
        const t = ctx.currentTime + 0.01;
        // Lub — pitch sweep (darbe etkisi)
        [[t, 140, 65, 0.65], [t + 0.26, 110, 52, 0.48]].forEach(([start, f0, f1, vol]) => {
          const { osc, gain: g } = _osc(ctx, f0, 'sine', start, start + 0.22, vol, dest);
          osc.frequency.exponentialRampToValueAtTime(f1, start + 0.08);
          g.gain.setValueAtTime(vol, start);
          g.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);
        });
      } catch(e) {}
    }

    let _hbTimer = null;
    function startHeartbeat() {
      if (_hbTimer) return;
      _beat();
      _hbTimer = setInterval(_beat, 900);
    }
    function stopHeartbeat() {
      if (_hbTimer) { clearInterval(_hbTimer); _hbTimer = null; }
    }

    return { unlock, keypress, correct, present, error, joker, lose, applause, startHeartbeat, stopHeartbeat, setMuted, isMuted };
  })();

  // KONFETİ
  function launchConfetti(count) {
    count = count || 110;
    const colors = ['#ff2a6d','#05d9e8','#00ff9f','#f5c400','#ffffff','#bf5fff'];
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const w = 4 + Math.random() * 9;
      const h = Math.random() > 0.45 ? w : w * 2.4;
      el.style.cssText =
        'left:'  + (Math.random() * 102) + 'vw;' +
        'width:' + w + 'px;height:' + h + 'px;' +
        'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
        'animation-duration:' + (1.6 + Math.random() * 2.2) + 's;' +
        'animation-delay:'    + (Math.random() * 0.9) + 's;';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), { once: true });
    }
  }

  const STORAGE_KEY = 'kodkirici_v1';

  function loadStats() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { score: 0, bestScore: 0 };
      const parsed = JSON.parse(raw);
      return {
        score: typeof parsed.score === 'number' ? parsed.score : 0,
        bestScore: typeof parsed.bestScore === 'number' ? parsed.bestScore : 0
      };
    } catch { return { score: 0, bestScore: 0 }; }
  }

  function saveStats() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      score: STATE.score,
      bestScore: STATE.bestScore
    }));
  }

  function updateBestDisplay() {
    document.getElementById('stat-best').textContent = STATE.bestScore;
  }

  function checkAndUpdateBest() {
    if (STATE.score > STATE.bestScore) {
      STATE.bestScore = STATE.score;
      saveStats();
      updateBestDisplay();
      document.getElementById('best-display').classList.add('new-record');
      return true;
    }
    saveStats();
    return false;
  }

  // Süre tablosu: seçili uzunluklar kümesine göre
  function calcSeconds(lengths) {
    // 4 harf → 45s, 5 harf → 60s, 6 harf → 90s, 7 harf → 120s
    const perLen = { 4: 45, 5: 60, 6: 90, 7: 120 };
    return lengths.reduce((sum, l) => sum + (perLen[l] || 60), 0);
  }

  function startGame(lengths, isCompetition) {
    STATE.isCompetitionMode = !!isCompetition;
    const saved = loadStats();
    STATE.bestScore = saved.bestScore;
    STATE.score = 0;
    STATE.currentLengthIdx = 0;
    STATE.canContinue = false;
    document.getElementById('best-display').classList.remove('new-record');
    updateBestDisplay();

    // Skor alanı: yarışmada göster, denemede gizle
    const scoreEl = document.getElementById('score-display');
    const bestEl  = document.getElementById('best-display');
    if (STATE.isCompetitionMode) {
      scoreEl.style.visibility = '';
      bestEl.style.visibility  = '';
    } else {
      scoreEl.style.visibility = 'hidden';
      bestEl.style.visibility  = 'hidden';
    }

    // Seçili uzunluklara göre kelime listesi oluştur
    ACTIVE_LENGTHS = lengths;
    ACTIVE_WORDS = [];
    if (lengths.includes(4)) ACTIVE_WORDS = ACTIVE_WORDS.concat(WORDS4);
    if (lengths.includes(5)) ACTIVE_WORDS = ACTIVE_WORDS.concat(WORDS5);
    if (lengths.includes(6)) ACTIVE_WORDS = ACTIVE_WORDS.concat(WORDS6);
    if (lengths.includes(7)) ACTIVE_WORDS = ACTIVE_WORDS.concat(WORDS7);

    // Süre ve hak ayarları
    // Yarışma modunda her şey sabit; deneme modunda customAttempts/customTime kullanılır
    STATE.baseMaxRows  = STATE.isCompetitionMode ? 6 : (customAttempts !== null ? customAttempts : 6);
    STATE.timerUnlimited = STATE.isCompetitionMode ? false : (customTime === Infinity);
    const seconds = STATE.timerUnlimited ? 0
                  : STATE.isCompetitionMode ? calcSeconds(lengths)
                  : (customTime !== null)  ? customTime
                  : calcSeconds(lengths);
    STATE.timerTotal = seconds;
    STATE.timerLeft  = seconds;
    if (STATE.timerInterval) clearInterval(STATE.timerInterval);

    initRound();
    updateScoreDisplay();
    updateTimerDisplay();
    hideOverlay();

    if (!STATE.timerUnlimited) {
      STATE.timerInterval = setInterval(() => {
        STATE.timerLeft--;
        updateTimerDisplay();
        if (STATE.timerLeft === 15) SFX.startHeartbeat();
        if (STATE.timerLeft <= 0) {
          clearInterval(STATE.timerInterval);
          STATE.timerLeft = 0;
          updateTimerDisplay();
          endSession();
        }
      }, 1000);
    }
  }

  function initRound() {
    SFX.stopHeartbeat();
    // Sıradaki uzunluğa ait havuzdan kelime seç
    const targetLen = ACTIVE_LENGTHS[STATE.currentLengthIdx];
    const pool = targetLen === 4 ? WORDS4 : targetLen === 5 ? WORDS5 : targetLen === 6 ? WORDS6 : WORDS7;
    STATE.targetWord = pool[Math.floor(Math.random() * pool.length)];
    STATE.wordLen = [...STATE.targetWord].length;
    document.getElementById('subtitle').textContent = STATE.wordLen + ' HARFLİ TÜRKÇE KELİME';
    STATE.guesses = [];
    STATE.currentInput = Array(STATE.wordLen).fill(null);
    STATE.currentRow = 0;
    STATE.maxRows = STATE.baseMaxRows || 6;
    STATE.jokerCount = 3;
    STATE.revealedPositions = [];
    STATE.gameOver = false;
    STATE.gameWon = false;
    STATE.hintUsed = false;
    STATE.letterStates = {};
    STATE.firstCorrect = new Set();
    STATE.firstPresent = new Set();
    STATE.isAnimating = false;

    renderBoard();
    renderJokerBar();
    renderKeyboard();
    updateKeyboardColors();
    updateHintButton();
  }

  function initGame() {
    if (STATE.timerInterval) clearInterval(STATE.timerInterval);
    showSetup();
  }

  // ═══════════════════════════════════════════════════
  // RENDER: BOARD
  // ═══════════════════════════════════════════════════
  function renderBoard() {
    const board = document.getElementById('game-board');
    board.innerHTML = '';
    const len = STATE.wordLen;

    // Ekran genişliğine ve kelime uzunluğuna göre dinamik tile boyutu
    const screenW = window.innerWidth;
    const gap = screenW <= 380 ? 4 : screenW <= 480 ? 5 : 6;
    const boardPadding = 28; // her iki yanda güvenli boşluk
    const available = Math.min(screenW, 480) - boardPadding;
    const maxByLen = len <= 4 ? 72 : len === 5 ? 62 : len === 6 ? 54 : 46;
    const fittedSize = Math.floor((available - (len - 1) * gap) / len);
    const size = Math.min(maxByLen, Math.max(fittedSize, 28)); // min 28px
    document.documentElement.style.setProperty('--tile-size', size + 'px');
    document.documentElement.style.setProperty('--tile-gap', gap + 'px');

    // Klavye tuş yüksekliğini de ekrana göre ayarla
    const keyH = screenW <= 380 ? 46 : screenW <= 480 ? 50 : 58;
    document.documentElement.style.setProperty('--key-height', keyH + 'px');

    for (let r = 0; r < STATE.maxRows; r++) {
      const row = document.createElement('div');
      row.className = 'tile-row';
      row.id = `row-${r}`;
      for (let c = 0; c < len; c++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.id = `tile-${r}-${c}`;
        row.appendChild(tile);
      }
      board.appendChild(row);
    }
  }

  // ═══════════════════════════════════════════════════
  // RENDER: JOKER BAR
  // ═══════════════════════════════════════════════════
  function renderJokerBar() {
    for (let i = 0; i < 3; i++) {
      const btn = document.getElementById(`joker-${i}`);
      btn.classList.remove('joker-used');
      btn.disabled = false;
    }
  }

  function updateJokerButtons() {
    for (let i = 0; i < 3; i++) {
      const btn = document.getElementById(`joker-${i}`);
      if (i >= STATE.jokerCount) {
        btn.classList.add('joker-used');
        btn.disabled = true;
      }
    }
  }

  // ═══════════════════════════════════════════════════
  // PARA & İPUCU
  // ═══════════════════════════════════════════════════
  function loadCoins() {
    STATE.coins = parseInt(localStorage.getItem(COINS_KEY) || '25', 10);
  }
  function saveCoins() {
    localStorage.setItem(COINS_KEY, STATE.coins);
  }
  function updateCoinDisplay() {
    document.getElementById('stat-coins').textContent = STATE.coins;
  }
  function updateHintButton() {
    const btn = document.getElementById('btn-hint');
    const label = document.getElementById('hint-label');
    if (STATE.hintUsed) {
      btn.disabled = true;
      label.textContent = '✓';
    } else if (STATE.gameOver) {
      btn.disabled = true;
    } else {
      btn.disabled = false;
      label.textContent = HINT_COST + '🪙';
    }
  }
  function useHint() {
    if (STATE.hintUsed) { showToast('BU KELİMEDE İPUCU KULLANILDI'); return; }
    if (STATE.gameOver || STATE.isAnimating) return;
    if (STATE.coins < HINT_COST) {
      showAdOverlay(true);
      return;
    }
    STATE.coins -= HINT_COST;
    STATE.hintUsed = true;
    saveCoins();
    updateCoinDisplay();
    updateHintButton();
    const cat = WORD_CATS[STATE.targetWord];
    const msg = cat ? '💡 İPUCU: ' + cat : '💡 İPUCU: ' + STATE.wordLen + ' harfli Türkçe kelime';
    showToast(msg);
  }

  let _adInterval = null;
  function showAdOverlay() {
    const overlay = document.getElementById('ad-overlay');
    const closeBtn = document.getElementById('ad-close');
    const timerEl = document.getElementById('ad-timer');
    overlay.classList.add('visible');
    let count = 5;
    timerEl.textContent = count;
    closeBtn.disabled = true;
    closeBtn.textContent = count + ' saniye bekle...';
    if (_adInterval) clearInterval(_adInterval);
    _adInterval = setInterval(() => {
      count--;
      timerEl.textContent = Math.max(count, 0);
      if (count <= 0) {
        clearInterval(_adInterval);
        _adInterval = null;
        closeBtn.disabled = false;
        closeBtn.textContent = 'KAPAT ve +' + AD_REWARD + '🪙 KAZAN';
      } else {
        closeBtn.textContent = count + ' saniye bekle...';
      }
    }, 1000);
  }
  function closeAdOverlay() {
    const overlay = document.getElementById('ad-overlay');
    if (!overlay.classList.contains('visible')) return;
    const closeBtn = document.getElementById('ad-close');
    if (closeBtn.disabled) return; // Süre dolmadı, kapatma
    overlay.classList.remove('visible');
    if (_adInterval) { clearInterval(_adInterval); _adInterval = null; }
    STATE.coins += AD_REWARD;
    saveCoins();
    updateCoinDisplay();
    showToast('+' + AD_REWARD + '🪙 KAZANDIN!');
  }

  // ═══════════════════════════════════════════════════
  // RENDER: KLAVYE
  // ═══════════════════════════════════════════════════
  const KB_ROWS = [
    ['q','w','e','r','t','y','u','ı','o','p','ğ','ü'],
    ['a','s','d','f','g','h','j','k','l','ş','i'],
    ['enter','z','x','c','v','b','n','m','ö','ç','backspace']
  ];

  function renderKeyboard() {
    const container = document.getElementById('keyboard');
    if (!container) return;
    container.innerHTML = '';
    KB_ROWS.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'key-row';
      row.forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'key' + (key === 'enter' || key === 'backspace' ? ' wide' : '');
        btn.dataset.key = key;
        btn.textContent = key === 'enter' ? 'GİR' : key === 'backspace' ? '⌫' : turkishUpper(key);
        btn.addEventListener('click', () => {
          SFX.unlock();
          if (STATE.gameOver || STATE.isAnimating) return;
          if (key === 'enter') handleEnter();
          else if (key === 'backspace') handleBackspace();
          else handleChar(key);
        });
        rowEl.appendChild(btn);
      });
      container.appendChild(rowEl);
    });
  }

  function updateKeyboardColors() {
    document.querySelectorAll('#keyboard .key[data-key]').forEach(btn => {
      const key = btn.dataset.key;
      if (key === 'enter' || key === 'backspace') return;
      const st = STATE.letterStates[key];
      btn.className = 'key' + (st ? ' ' + st : '');
    });
  }

  // ═══════════════════════════════════════════════════
  // TIMER & SCORE
  // ═══════════════════════════════════════════════════
  function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    if (STATE.timerUnlimited) {
      el.textContent = '∞';
      el.classList.remove('warning');
      return;
    }
    const m = Math.floor(STATE.timerLeft / 60).toString().padStart(2, '0');
    const s = (STATE.timerLeft % 60).toString().padStart(2, '0');
    el.textContent = `${m}:${s}`;
    if (STATE.timerLeft <= 10) {
      el.classList.add('warning');
    } else {
      el.classList.remove('warning');
    }
  }

  function updateScoreDisplay() {
    document.getElementById('stat-score').textContent = STATE.score;
  }

  function showScorePop(text) {
    const anchor = document.getElementById('score-display');
    const pop = document.createElement('span');
    pop.className = 'score-pop';
    pop.textContent = text;
    anchor.appendChild(pop);
    pop.addEventListener('animationend', () => pop.remove(), { once: true });
  }

  // ═══════════════════════════════════════════════════
  // TOAST
  // ═══════════════════════════════════════════════════
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('visible'), 1600);
  }

  // ═══════════════════════════════════════════════════
  // GİRDİ İŞLEME
  // ═══════════════════════════════════════════════════
  function handleKeyPress(key) {
    if (STATE.gameOver || STATE.isAnimating) return;

    if (key === 'Enter') {
      handleEnter();
    } else if (key === 'Backspace') {
      handleBackspace();
    } else {
      handleChar(key);
    }
  }

  function handleChar(char) {
    const row = STATE.currentRow;
    let pos = -1;
    for (let i = 0; i < STATE.wordLen; i++) {
      if (!STATE.revealedPositions.includes(i) && STATE.currentInput[i] === null) {
        pos = i; break;
      }
    }
    if (pos === -1) return;
    STATE.currentInput[pos] = char;
    updateCurrentTile(row, pos, char, false);
    SFX.keypress();
  }

  function handleBackspace() {
    const row = STATE.currentRow;
    let pos = -1;
    for (let i = STATE.wordLen - 1; i >= 0; i--) {
      if (!STATE.revealedPositions.includes(i) && STATE.currentInput[i] !== null) {
        pos = i; break;
      }
    }
    if (pos === -1) return;
    STATE.currentInput[pos] = null;
    const tile = document.getElementById(`tile-${row}-${pos}`);
    tile.textContent = '';
    tile.className = 'tile';
  }

  function updateCurrentTile(row, col, char, isJoker) {
    const tile = document.getElementById(`tile-${row}-${col}`);
    tile.textContent = turkishUpper(char);
    tile.className = 'tile ' + (isJoker ? 'joker-revealed' : 'filled bounce');
    if (!isJoker) {
      tile.addEventListener('animationend', () => {
        tile.classList.remove('bounce');
      }, { once: true });
    }
  }

  // ═══════════════════════════════════════════════════
  // TAHMİN DOĞRULAMA ALGORİTMASI
  // ═══════════════════════════════════════════════════
  function computeTileStates(guess, target) {
    const len = [...target].length;
    const states = Array(len).fill('absent');
    const targetChars = [...target];
    const guessChars = [...guess];
    const remaining = [...targetChars];

    for (let i = 0; i < len; i++) {
      if (guessChars[i] === targetChars[i]) {
        states[i] = 'correct';
        remaining[i] = null;
      }
    }
    for (let i = 0; i < len; i++) {
      if (states[i] === 'correct') continue;
      const idx = remaining.indexOf(guessChars[i]);
      if (idx !== -1) {
        states[i] = 'present';
        remaining[idx] = null;
      }
    }
    return states;
  }

  // ═══════════════════════════════════════════════════
  // ENTER / TAHMİN GÖNDER
  // ═══════════════════════════════════════════════════
  function handleEnter() {
    const row = STATE.currentRow;
    const len = STATE.wordLen;
    const targetChars = [...STATE.targetWord];

    const guessChars = [];
    for (let i = 0; i < len; i++) {
      if (STATE.revealedPositions.includes(i)) {
        guessChars.push(targetChars[i]);
      } else if (STATE.currentInput[i] !== null) {
        guessChars.push(STATE.currentInput[i]);
      } else {
        showToast(len + ' HARF GEREKLİ');
        shakeRow(row);
        SFX.error();
        return;
      }
    }

    const guess = guessChars.join('');
    const allWords = WORDS4.concat(WORDS5).concat(WORDS6).concat(WORDS7);

    if (!allWords.includes(guess)) {
      showToast('KELİME BULUNAMADI');
      shakeRow(row);
      SFX.error();

      // State'i hemen güncelle — kullanıcı hemen yazmaya başlayabilsin
      const tileStates = computeTileStates(guess, STATE.targetWord);
      const gc = [...guess];
      updateLetterStates(tileStates, gc);
      awardTilePoints(tileStates, gc, row);
      STATE.currentInput = Array(len).fill(null);
      STATE.currentRow++;
      STATE.revealedPositions = [];

      // Renkleri hemen uygula — shake animasyonu renkli tile'lar üzerinde oynar
      for (let c = 0; c < len; c++) {
        const t = document.getElementById(`tile-${row}-${c}`);
        t.textContent = turkishUpper(gc[c]);
        t.className = 'tile ' + tileStates[c];
        if (tileStates[c] === 'correct') setTimeout(() => SFX.correct(), c * 80);
        else if (tileStates[c] === 'present') setTimeout(() => SFX.present(), c * 80);
      }
      if (STATE.currentRow >= STATE.maxRows) {
        setTimeout(() => endGame(false), 450); // shake bitsin
      }
      return;
    }

    submitGuess(guess);
  }

  function updateLetterStates(tileStates, guessChars) {
    const PRIORITY = { correct: 3, present: 2, absent: 1 };
    tileStates.forEach((st, i) => {
      const letter = guessChars[i];
      const current = STATE.letterStates[letter];
      // Sadece daha iyi (yüksek öncelikli) durum günceller
      if (!current || PRIORITY[st] > PRIORITY[current]) {
        STATE.letterStates[letter] = st;
      }
    });
  }

  // Joker olmayan pozisyonlar için ilk kez correct/present puanı ver
  function awardTilePoints(tileStates, guessChars, row) {
    if (!STATE.isCompetitionMode) return; // Deneme modunda puan yok
    let gained = 0;
    tileStates.forEach((st, i) => {
      if (STATE.revealedPositions.includes(i)) return; // joker — puan yok
      const posKey = `${row}-${i}`;
      const letter = guessChars[i];
      if (st === 'correct' && !STATE.firstCorrect.has(posKey)) {
        STATE.firstCorrect.add(posKey);
        gained += 10;
      } else if (st === 'present' && !STATE.firstPresent.has(letter)) {
        STATE.firstPresent.add(letter);
        gained += 1;
      }
    });
    if (gained > 0) {
      STATE.score += gained;
      saveStats();
      updateScoreDisplay();
      showScorePop('+' + gained);
    }
  }

  function shakeRow(row) {
    const rowEl = document.getElementById(`row-${row}`);
    rowEl.classList.add('shake');
    const onShakeEnd = (e) => {
      if (e.target !== rowEl) return; // child bubble'larını yoksay
      rowEl.classList.remove('shake');
      rowEl.removeEventListener('animationend', onShakeEnd);
    };
    rowEl.addEventListener('animationend', onShakeEnd);
  }

  // ═══════════════════════════════════════════════════
  // TAHMİN ANİMASYONU
  // ═══════════════════════════════════════════════════
  function submitGuess(guess) {
    STATE.isAnimating = true;
    const row = STATE.currentRow;
    const target = STATE.targetWord;
    const guessChars = [...guess];
    const len = STATE.wordLen;
    const tileStates = computeTileStates(guess, target);

    updateLetterStates(tileStates, guessChars);

    guessChars.forEach((char, i) => {
      const tile = document.getElementById(`tile-${row}-${i}`);
      const delay = i * 300;
      setTimeout(() => {
        tile.style.transition = 'transform 150ms ease-in';
        tile.style.transform = 'rotateX(90deg)';
      }, delay);
      setTimeout(() => {
        tile.className = `tile ${tileStates[i]}`;
        tile.textContent = turkishUpper(char);
        tile.style.transition = 'transform 150ms ease-out';
        tile.style.transform = 'rotateX(0deg)';
        if (tileStates[i] === 'correct') SFX.correct();
        else if (tileStates[i] === 'present') SFX.present();
      }, delay + 150);
    });

    const totalDelay = len * 300 + 150;

    setTimeout(() => {
      // Puan: joker olmayan correct/present harfler
      awardTilePoints(tileStates, guessChars, row);

      STATE.guesses.push(guess);
      STATE.currentRow++;
      STATE.currentInput = Array(len).fill(null);
      STATE.revealedPositions = [];
      STATE.isAnimating = false;
      updateKeyboardColors();

      const won = guess === target;
      const lost = !won && STATE.currentRow >= STATE.maxRows;

      if (won) {
        const winRow = document.getElementById(`row-${row}`);
        winRow.style.animation = 'victory-row 400ms ease-in-out';
        setTimeout(() => endGame(true), 600);
      } else if (lost) {
        setTimeout(() => endGame(false), 300);
      }
    }, totalDelay + 100);
  }

  // ═══════════════════════════════════════════════════
  // JOKER
  // ═══════════════════════════════════════════════════
  function getCorrectlyGuessedPositions() {
    const positions = new Set();
    STATE.guesses.forEach(guess => {
      const chars = [...guess];
      const target = [...STATE.targetWord];
      chars.forEach((c, i) => {
        if (c === target[i]) positions.add(i);
      });
    });
    return positions;
  }

  function useJoker() {
    if (STATE.jokerCount <= 0 || STATE.gameOver || STATE.isAnimating) return;

    const correctPos = getCorrectlyGuessedPositions();
    const targetChars = [...STATE.targetWord];
    const indices = targetChars.map((_, i) => i);

    const available = indices.filter(i => {
      if (STATE.revealedPositions.includes(i)) return false;
      if (correctPos.has(i)) return false;
      if (STATE.letterStates[targetChars[i]] !== undefined) return false;
      return true;
    });

    if (available.length === 0) {
      showToast('AÇILACAK HARF YOK');
      return;
    }

    const chosen = available[Math.floor(Math.random() * available.length)];
    const letter = targetChars[chosen];
    const row = STATE.currentRow;
    const len = STATE.wordLen;

    for (let c = 0; c < len; c++) {
      const t = document.getElementById(`tile-${row}-${c}`);
      t.textContent = '';
      t.className = 'tile';
    }
    STATE.maxRows--;
    STATE.currentInput = Array(len).fill(null);
    STATE.revealedPositions = [];
    STATE.jokerCount--;
    updateJokerButtons();

    if (STATE.currentRow >= STATE.maxRows) {
      endGame(false);
      return;
    }

    STATE.revealedPositions.push(chosen);
    STATE.currentInput[chosen] = letter;
    const tile = document.getElementById(`tile-${row}-${chosen}`);
    tile.textContent = turkishUpper(letter);
    tile.className = 'tile joker-revealed';
    SFX.joker();
  }

  // Joker butonlarını bağla
  document.getElementById('joker-0').addEventListener('click', useJoker);
  document.getElementById('joker-1').addEventListener('click', useJoker);
  document.getElementById('joker-2').addEventListener('click', useJoker);

  // ═══════════════════════════════════════════════════
  // OYUN SONU
  // ═══════════════════════════════════════════════════
  function endGame(won) {
    STATE.gameOver = true;
    STATE.gameWon = won;

    const overlay = document.getElementById('screen-overlay');
    const title = document.getElementById('overlay-title');
    const wordEl = document.getElementById('overlay-word');
    const descEl = document.getElementById('overlay-desc');

    STATE.canContinue = false;
    SFX.stopHeartbeat();
    if (won) {
      // Kelime başına bonus: az tahminde daha çok puan (6.→10p, 1.→60p)
      const attemptCount = STATE.currentRow;
      let gained = 0;
      if (STATE.isCompetitionMode) {
        gained = Math.max(1, 7 - attemptCount) * 10;
        STATE.score += gained;
        saveStats();
        updateScoreDisplay();
      }

      // Sıradaki uzunluğa geç
      STATE.currentLengthIdx++;

      // Tüm uzunluklar bitti mi?
      if (STATE.currentLengthIdx >= ACTIVE_LENGTHS.length) {
        setTimeout(() => endChallenge(), 600);
        return;
      }

      // Bir sonraki uzunluk var — devam overlay'i
      STATE.canContinue = true;
      pauseTimer();
      SFX.applause(2.8, 0.45);
      title.textContent = 'ŞİFRE KIRILDI!';
      title.className = 'win';
      wordEl.textContent = STATE.isCompetitionMode ? `+${gained} PUAN` : turkishUpper(STATE.targetWord);
      descEl.textContent = `${attemptCount}. TAHMİNDE`;
    } else {
      // Kaybedildi — oyun biter
      checkAndUpdateBest();
      SFX.lose();
      title.textContent = 'BAŞARISIZ';
      title.className = 'lose';
      wordEl.textContent = turkishUpper(STATE.targetWord);
      descEl.textContent = 'DOĞRU KELİME';
    }

    setOverlayScores();
    showOverlayButtons(STATE.canContinue);
    setTimeout(() => overlay.classList.add('visible'), 500);
  }

  // Overlay puan satırını mod'a göre göster/gizle
  function setOverlayScores() {
    const statsEl = document.getElementById('overlay-stats');
    if (STATE.isCompetitionMode) {
      statsEl.style.display = '';
      document.getElementById('ov-score').textContent = STATE.score;
      document.getElementById('ov-best').textContent = STATE.bestScore;
    } else {
      statsEl.style.display = 'none';
    }
  }

  // Tüm uzunluklar çözüldüğünde büyük kutlama
  function endChallenge() {
    STATE.gameOver = true;
    STATE.canContinue = false;
    if (STATE.timerInterval) clearInterval(STATE.timerInterval);

    SFX.stopHeartbeat();
    SFX.applause(5.0, 0.75);
    launchConfetti(130);

    const overlay = document.getElementById('screen-overlay');
    const title   = document.getElementById('overlay-title');
    const wordEl  = document.getElementById('overlay-word');
    const descEl  = document.getElementById('overlay-desc');

    const isNewRecord = STATE.isCompetitionMode ? checkAndUpdateBest() : false;
    title.textContent = 'TÜMÜNÜ KIRDIN!';
    title.className = 'win';
    wordEl.textContent = STATE.isCompetitionMode ? STATE.score + ' PUAN' : '🎯 TEBRIKLER!';
    descEl.textContent = isNewRecord
      ? '🏆 YENİ REKOR!'
      : ACTIVE_LENGTHS.join(', ') + ' HARFLİ TAMAMLANDI';
    setOverlayScores();
    showOverlayButtons(false);
    setTimeout(() => overlay.classList.add('visible'), 400);
  }

  // Süre dolduğunda
  function endSession() {
    STATE.gameOver = true;
    STATE.canContinue = false;
    if (STATE.timerInterval) clearInterval(STATE.timerInterval);

    const overlay = document.getElementById('screen-overlay');
    const title = document.getElementById('overlay-title');
    const wordEl = document.getElementById('overlay-word');
    const descEl = document.getElementById('overlay-desc');

    SFX.stopHeartbeat();

    const isNewRecord = STATE.isCompetitionMode ? checkAndUpdateBest() : false;
    SFX.lose();
    title.textContent = 'SÜRE DOLDU';
    title.className = 'lose';
    wordEl.textContent = turkishUpper(STATE.targetWord);
    descEl.textContent = isNewRecord ? '🏆 YENİ REKOR!' : 'DOĞRU KELİMEYDİ';
    setOverlayScores();
    showOverlayButtons(false);
    setTimeout(() => overlay.classList.add('visible'), 300);
  }

  function hideOverlay() {
    document.getElementById('screen-overlay').classList.remove('visible');
  }

  function pauseTimer() {
    if (STATE.timerInterval) {
      clearInterval(STATE.timerInterval);
      STATE.timerInterval = null;
      STATE.timerPaused = true;
    }
  }

  function resumeTimer() {
    if (!STATE.timerPaused || STATE.timerUnlimited) return;
    STATE.timerPaused = false;
    STATE.timerInterval = setInterval(() => {
      STATE.timerLeft--;
      updateTimerDisplay();
      if (STATE.timerLeft === 15) SFX.startHeartbeat();
      if (STATE.timerLeft <= 0) {
        clearInterval(STATE.timerInterval);
        STATE.timerLeft = 0;
        updateTimerDisplay();
        endSession();
      }
    }, 1000);
  }

  function showOverlayButtons(canContinue) {
    document.getElementById('btn-continue').style.display = canContinue ? '' : 'none';
    document.getElementById('btn-new-game').textContent = 'YENİ OYUN';
  }

  function showSetup() {
    document.getElementById('setup-overlay').classList.add('visible');
  }

  function hideSetup() {
    document.getElementById('setup-overlay').classList.remove('visible');
  }

  document.getElementById('btn-end-game').addEventListener('click', () => {
    if (STATE.gameOver) return;
    if (!STATE.timerInterval && !STATE.timerUnlimited) return;
    endSession();
  });

  document.getElementById('btn-continue').addEventListener('click', () => {
    SFX.unlock();
    STATE.canContinue = false;
    hideOverlay();
    resumeTimer();
    initRound();
  });

  document.getElementById('btn-new-game').addEventListener('click', () => {
    SFX.unlock();
    STATE.canContinue = false;
    STATE.timerPaused = false;
    if (STATE.timerInterval) { clearInterval(STATE.timerInterval); STATE.timerInterval = null; }
    hideOverlay();
    showSetup();
  });

  // ═══════════════════════════════════════════════════
  // FİZİKSEL KLAVYE DESTEĞİ
  // ═══════════════════════════════════════════════════
  const CODE_MAP = {
    'KeyQ':'e','KeyW':'r','KeyE':'t','KeyR':'y','KeyT':'u',
    'KeyY':'ı','KeyU':'o','KeyI':'p','KeyO':'ğ','KeyP':'ü',
    'KeyA':'a','KeyS':'s','KeyD':'d','KeyF':'f','KeyG':'g',
    'KeyH':'h','KeyJ':'j','KeyK':'k','KeyL':'l','Semicolon':'ş','Quote':'i',
    'KeyZ':'z','KeyX':'x','KeyC':'c','KeyV':'v','KeyB':'b',
    'KeyN':'n','KeyM':'m','Comma':'ö','Period':'ç',
  };

  document.addEventListener('keydown', e => {
    SFX.unlock(); // AudioContext'i ilk tuş basımında etkinleştir
    if (STATE.gameOver || STATE.isAnimating) return;
    if (e.ctrlKey || e.altKey || e.metaKey) return;

    if (e.key === 'Enter') { e.preventDefault(); handleEnter(); return; }
    if (e.key === 'Backspace') { e.preventDefault(); handleBackspace(); return; }

    // Türkçe harf mi?
    const lower = turkishLower(e.key);
    const trChars = 'abcçdefgğhıijklmnoöprsştuüvyz';
    if ([...lower].length === 1 && trChars.includes(lower)) {
      e.preventDefault();
      handleChar(lower);
      return;
    }

    // Code bazlı fallback (QWERTY klavyede türkçe mapping)
    const mapped = CODE_MAP[e.code];
    if (mapped) { e.preventDefault(); handleChar(mapped); }
  });

  // ═══════════════════════════════════════════════════
  // SETUP OVERLAY
  // ═══════════════════════════════════════════════════
  let selectedLengths = new Set();
  let customAttempts  = null;   // null → ORİJİNAL (6)
  let customTime      = null;   // null → ORİJİNAL, Infinity → sınırsız
  let currentSetupMode = 'practice'; // 'practice' | 'competition'

  const COMP_LENGTHS = [4, 5, 6, 7];

  function secsToText(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return s === 0 ? m + ' DAKİKA' : m + ':' + String(s).padStart(2,'0');
  }

  function updateSetupUI() {
    const startBtn = document.getElementById('btn-start-game');
    const timeVal  = document.getElementById('setup-time-val');
    if (currentSetupMode === 'competition') {
      startBtn.disabled = false;
      return;
    }
    // practice mode
    if (selectedLengths.size === 0) {
      startBtn.disabled = true;
      timeVal.textContent = '—';
      return;
    }
    startBtn.disabled = false;
    if (customTime === Infinity) {
      timeVal.textContent = '∞';
    } else {
      const secs = (customTime !== null) ? customTime : calcSeconds([...selectedLengths]);
      timeVal.textContent = secsToText(secs);
    }
  }

  function switchSetupMode(mode) {
    currentSetupMode = mode;
    document.getElementById('tab-practice').classList.toggle('active', mode === 'practice');
    document.getElementById('tab-comp').classList.toggle('active', mode === 'competition');
    document.getElementById('practice-panel').classList.toggle('hidden', mode === 'competition');
    document.getElementById('comp-info').classList.toggle('visible', mode === 'competition');

    if (mode === 'competition') {
      const secs = calcSeconds(COMP_LENGTHS);
      document.getElementById('comp-time-val').textContent = secsToText(secs);
    }
    updateSetupUI();
  }

  document.getElementById('tab-practice').addEventListener('click', () => switchSetupMode('practice'));
  document.getElementById('tab-comp').addEventListener('click', () => switchSetupMode('competition'));

  document.querySelectorAll('.length-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const len = parseInt(btn.dataset.len);
      if (selectedLengths.has(len)) {
        selectedLengths.delete(len);
        btn.classList.remove('active');
      } else {
        selectedLengths.add(len);
        btn.classList.add('active');
      }
      updateSetupUI();
    });
  });

  document.getElementById('attempts-group').addEventListener('click', e => {
    const btn = e.target.closest('.setup-btn');
    if (!btn) return;
    document.querySelectorAll('#attempts-group .setup-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const val = btn.dataset.attempts;
    customAttempts = (val === 'ori') ? null : parseInt(val);
  });

  document.getElementById('time-group').addEventListener('click', e => {
    const btn = e.target.closest('.setup-btn');
    if (!btn) return;
    document.querySelectorAll('#time-group .setup-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const val = btn.dataset.time;
    customTime = (val === 'ori') ? null : (val === 'inf') ? Infinity : parseInt(val);
    updateSetupUI();
  });

  document.getElementById('btn-start-game').addEventListener('click', () => {
    if (currentSetupMode === 'competition') {
      hideSetup();
      startGame(COMP_LENGTHS, true);
    } else {
      if (selectedLengths.size === 0) return;
      hideSetup();
      startGame([...selectedLengths].sort(), false);
    }
  });

  // ═══════════════════════════════════════════════════
  // BAŞLAT
  // ═══════════════════════════════════════════════════
  // ═══════════════════════════════════════════════════
  // AYARLAR PANELİ
  // ═══════════════════════════════════════════════════
  function applyTheme(light) {
    document.body.classList.toggle('dark', !light);
    document.getElementById('btn-theme-dark').classList.toggle('active', !light);
    document.getElementById('btn-theme-light').classList.toggle('active', light);
    localStorage.setItem('kodkirici_theme', light ? 'light' : 'dark');
  }

  function applySound(enabled) {
    SFX.setMuted(!enabled);
    document.getElementById('btn-sound-on').classList.toggle('active', enabled);
    document.getElementById('btn-sound-off').classList.toggle('active', !enabled);
    localStorage.setItem('kodkirici_sound', enabled ? 'on' : 'off');
  }

  function openSettings() {
    document.getElementById('settings-overlay').classList.add('visible');
  }

  document.getElementById('btn-settings').addEventListener('click', openSettings);
  document.getElementById('btn-settings-from-setup').addEventListener('click', openSettings);

  document.getElementById('btn-settings-close').addEventListener('click', () => {
    document.getElementById('settings-overlay').classList.remove('visible');
  });

  document.getElementById('settings-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('settings-overlay'))
      document.getElementById('settings-overlay').classList.remove('visible');
  });

  document.getElementById('btn-theme-dark').addEventListener('click', () => applyTheme(false));
  document.getElementById('btn-theme-light').addEventListener('click', () => applyTheme(true));
  document.getElementById('btn-sound-on').addEventListener('click', () => applySound(true));
  document.getElementById('btn-sound-off').addEventListener('click', () => applySound(false));
  document.getElementById('btn-hint').addEventListener('click', () => useHint());
  document.getElementById('ad-close').addEventListener('click', () => closeAdOverlay());

  window.addEventListener('resize', () => {
    if (STATE.wordLen) renderBoard();
  });

  document.addEventListener('DOMContentLoaded', () => {
    applyTheme(localStorage.getItem('kodkirici_theme') !== 'dark');
    applySound(localStorage.getItem('kodkirici_sound') !== 'off');
    loadCoins();
    updateCoinDisplay();
    updateHintButton();

    STATE.wordLen = 5;
    renderBoard();
    renderJokerBar();
    renderKeyboard();
    document.getElementById('timer-display').textContent = '--:--';
    updateSetupUI();
    showSetup();
  });
  </script>
</body>
</html>
